name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

# ensure that the workflow is only triggered once per ref, subsequent runs on the ref will cancel
# and restart the workflow. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: sigye
          target: ${{ matrix.target }}
          manifest-path: crates/sigye/Cargo.toml
          archive: sigye-$target
          checksum: sha256
          locked: true
          dry-run: ${{ github.event_name != 'release' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew tap
    needs: release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v7
        with:
          repository: am2rican5/homebrew-sigye
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Regenerate and push formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          base="https://github.com/am2rican5/sigye/releases/download/${TAG}"
          sha() { gh release download "$TAG" -R am2rican5/sigye -p "sigye-$1.sha256" -O - | awk '{print $1}'; }
          mac_arm=$(sha aarch64-apple-darwin)
          mac_x86=$(sha x86_64-apple-darwin)
          lin_arm=$(sha aarch64-unknown-linux-gnu)
          lin_x86=$(sha x86_64-unknown-linux-gnu)
          mkdir -p Formula
          cat > Formula/sigye.rb <<EOF
          class Sigye < Formula
            desc "Beautiful terminal clock with ASCII art fonts"
            homepage "https://github.com/am2rican5/sigye"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/sigye-aarch64-apple-darwin.tar.gz"
                sha256 "${mac_arm}"
              end
              on_intel do
                url "${base}/sigye-x86_64-apple-darwin.tar.gz"
                sha256 "${mac_x86}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/sigye-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${lin_arm}"
              end
              on_intel do
                url "${base}/sigye-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${lin_x86}"
              end
            end

            def install
              bin.install "sigye"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sigye --version")
            end
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sigye.rb
          git diff --cached --quiet || git commit -m "sigye ${TAG#v}"
          git push
